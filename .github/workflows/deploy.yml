name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, mini-app, feat/*, test/*] # Trigger on your current branch too
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_STORAGE_MODE: ${{ vars.VITE_STORAGE_MODE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
