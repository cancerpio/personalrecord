version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: local-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: devuser
      MONGO_INITDB_ROOT_PASSWORD: devpassword
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
